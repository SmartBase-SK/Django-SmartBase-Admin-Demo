image: python:3.6

variables:
  XDG_CACHE_HOME: "xdg-cache"
  DJANGO_COMPOSE_VERSION: ""
  CORE_VERSION: ""
  BUILD_SCRIPTS_VERSION: ""

cache:
  paths:
    - node_modules
    - xdg-cache
    - apt-cache
    - pip-cache
  key: "$CI_COMMIT_REF_SLUG"

stages:
  - test
  - analysis
  - deploy

deployStaging:
  stage: deploy
  script:
    - STAGING_SERVER=prime.smartbase.sk
    - export AUTH_STRING_OVERRIDE='allow all;'

    - export READ_ONLY_POSTGRES_USER=readonly_user
    - export READ_ONLY_POSTGRES_PASSWORD=readonly_password

    - DEPLOY_SERVER_LOGIN="gitlab@${STAGING_SERVER}"
    - if  [ -n "$BUILD_SCRIPTS_VERSION" ]; then
          git clone --depth 1 --single-branch --branch $BUILD_SCRIPTS_VERSION https://gitlab-ci-token:${CI_JOB_TOKEN}@gitlab.smartbase.sk/dev/smartshop-build-scripts.git;
      else
          git clone https://gitlab-ci-token:${CI_JOB_TOKEN}@gitlab.smartbase.sk/dev/smartshop-build-scripts.git;
      fi
    - source ./smartshop-build-scripts/ssh_setup.sh
    - source ./smartshop-build-scripts/variable_setup.sh
    - PROJECT_DEPLOY_DOMAIN=$STAGING_SERVER
    - PROJECT_DEPLOY_PORT=$VIRTUAL_PORT
    - source ./smartshop-build-scripts/sync_django_compose.sh "PROJECT_DEPLOY_DOMAIN=$PROJECT_DEPLOY_DOMAIN" "AUTH_STRING_OVERRIDE=$AUTH_STRING_OVERRIDE" "READ_ONLY_POSTGRES_USER=$READ_ONLY_POSTGRES_USER"  "READ_ONLY_POSTGRES_PASSWORD=$READ_ONLY_POSTGRES_PASSWORD"
    - rsync -avzc --no-o --no-g -e "ssh -p $SSH_PORT" ./django_compose_override_staging/ $DEPLOY_SERVER_LOGIN:"/home/gitlab/$CI_PROJECT_NAME/";
    - source ./smartshop-build-scripts/build_code.sh
    - source ./smartshop-build-scripts/pre_deploy.sh
    - source ./smartshop-build-scripts/deploy_staging.sh
  tags:
    - runner
  environment:
    name: staging
    url: http://$PROJECT_DEPLOY_DOMAIN
  when: manual

